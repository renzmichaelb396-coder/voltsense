services:
  - type: web
    name: voltsense-csms
    runtime: node
    buildCommand: npm install && npm run build:emit
    startCommand: node dist/server/main.js
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false
      - key: VOLTSENSE_SHIELD_USER
        sync: false
      - key: VOLTSENSE_SHIELD_PASSWORD
        sync: false
      # OCPP Security Profile 1 — B26471 Basic Auth (OCPPSetTool)
      - key: OCPP_AUTH_USER
        sync: false
      - key: OCPP_AUTH_PASSWORD
        sync: false
      # Go Hotels host-earnings.html → GET /host/earnings (NOT /admin/earnings)
      - key: HOST_AUTH_USER
        sync: false
      - key: HOST_AUTH_PASSWORD
        sync: false
