<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VoltSense — Payment Cancelled</title><meta name="description" content="Payment cancelled page for VoltSense EV charging stations."><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0a0e1a;--card:#111827;--card-border:#1f2d3d;--accent-start:#16d39a;--accent-end:#0ea5e9;--text:#f1f5f9;--text-muted:#94a3b8;--danger:#f87171;--radius:12px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;padding:1.5rem 1rem 3rem}header{text-align:center;margin-bottom:2rem}.logo{font-size:1.5rem;font-weight:700;background:linear-gradient(90deg,var(--accent-start),var(--accent-end));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}header p{color:var(--text-muted);font-size:.85rem;margin-top:.5rem}main{flex:1;max-width:420px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:center}.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:2.5rem 1.75rem;text-align:center;width:100%}.icon{width:56px;height:56px;margin:0 auto 1.25rem;border-radius:50%;display:grid;place-items:center;background:rgba(248,113,113,.12)}.icon svg{stroke:var(--danger)}h2{font-size:1.15rem;font-weight:700;margin-bottom:.6rem}p{color:var(--text-muted);font-size:.9rem;line-height:1.5}.retry-btn{margin-top:1.5rem;background:linear-gradient(135deg,var(--accent-start),var(--accent-end));color:#fff;border:none;padding:.75rem 1.75rem;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;width:100%}.note{font-size:.78rem;margin-top:1.25rem;color:var(--text-muted);opacity:.8}footer{text-align:center;color:var(--text-muted);font-size:.75rem;margin-top:2rem}</style></head><body>
<header><span class="logo">⚡ VoltSense</span><p id="tagline">Payment not completed</p></header>
<main>
<div class="card">
<div class="icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
<h2>Payment was not completed</h2>
<p>No charge was made to your card. You can try again anytime.</p>
<button class="retry-btn" id="retryBtn">Try Again</button>
<p class="note">If you were charged but the charger did not start, contact the site host.</p>
</div>
</main>
<footer>Powered by GCash · Maya · PayMongo</footer>
<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function buildRetryUrl() {
  const cpid = getParam('cpid');
  const cid = getParam('cid');
  if (cpid && cid) {
    return 'charge.html?cpid=' + encodeURIComponent(cpid) + '&cid=' + encodeURIComponent(cid);
  }
  return 'charge.html';
}

document.getElementById('retryBtn').addEventListener('click', () => {
  window.location.href = buildRetryUrl();
});
</script>
</body></html>
