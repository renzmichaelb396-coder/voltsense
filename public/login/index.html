<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><meta name="robots" content="noindex,nofollow"/><meta name="description" content="VoltSense administration sign-in — Civicgrid Software Development Services."/><title>VoltSense · Admin Sign-in</title><style>:root{--bg:#0a0e1a;--card:#161f33;--card-border:#243049;--text:#e6ebf5;--muted:#94a3b8;--brand:#16d39a;--brand-2:#0ea5e9;--accent:#1f2a44;--shadow:0 20px 50px -20px rgba(0,0,0,.6);--err:#f87171}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(1200px 600px at 80% -10%,rgba(14,165,233,.18),transparent 60%),radial-gradient(900px 500px at 0% 10%,rgba(22,211,154,.12),transparent 55%),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;display:grid;place-items:center;padding:24px;line-height:1.6}.card{width:100%;max-width:404px;background:var(--card);border:1px solid var(--card-border);border-radius:18px;box-shadow:var(--shadow);padding:36px 32px;animation:pop .24s cubic-bezier(.16,1,.3,1)}@keyframes pop{from{transform:translateY(12px) scale(.97);opacity:0}to{transform:none;opacity:1}}.brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:#042018;font-weight:800;font-size:1.1rem;box-shadow:0 6px 18px -6px rgba(22,211,154,.7)}.brand b{font-weight:700;letter-spacing:-.02em;font-size:1.1rem}.brand small{display:block;font-weight:500;font-size:.7rem;color:var(--muted)}h1{font-size:1.35rem;letter-spacing:-.02em;margin-bottom:6px}.lede{color:var(--muted);font-size:.9rem;margin-bottom:24px}label{display:block;font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}.field{margin-bottom:18px}input{width:100%;background:var(--bg);border:1px solid var(--card-border);border-radius:11px;color:var(--text);font:inherit;font-size:.98rem;padding:13px 14px;transition:border-color .15s,box-shadow .15s}input::placeholder{color:#566080}input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(22,211,154,.16)}.btn{width:100%;border:none;cursor:pointer;font:inherit;font-weight:600;font-size:1.02rem;color:#042018;background:linear-gradient(135deg,var(--brand),var(--brand-2));padding:14px 24px;border-radius:12px;box-shadow:0 14px 30px -12px rgba(22,211,154,.65);transition:transform .15s ease,filter .2s;margin-top:6px}.btn:hover{transform:translateY(-2px);filter:brightness(1.05)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.6;cursor:progress;transform:none}.err{color:var(--err);font-size:.85rem;min-height:1.2em;margin-top:14px;text-align:center}.foot{margin-top:22px;text-align:center;color:var(--muted);font-size:.74rem;line-height:1.5}.foot span{display:inline-flex;align-items:center;gap:6px}.dot{width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px rgba(22,211,154,.18)}</style></head><body><main class="card"><div class="brand"><div class="logo">V</div><div><b>VoltSense</b><small>EV Charging Network Layer</small></div></div><h1>Administration Sign-in</h1><p class="lede">Authorized operators only. Sessions are issued by the VoltSense control plane.</p><form id="f" novalidate autocomplete="off"><div class="field"><label for="id">Admin Identifier</label><input id="id" name="id" type="text" inputmode="email" autocomplete="username" placeholder="operator@civicgrid.dev" required/></div><div class="field"><label for="key">Secure Key</label><input id="key" name="key" type="password" autocomplete="current-password" placeholder="••••••••••••" required/></div><button class="btn" id="go" type="submit">Sign in to Console</button><p class="err" id="err" role="alert" aria-live="polite"></p></form><p class="foot"><span><span class="dot"></span> Operated by Civicgrid Software Development Services</span></p></main><script>(function(){"use strict";
/* ───────────────────────────────────────────────────────────────
   PLACEHOLDER SESSION HANDOFF — NOT AUTHENTICATION.
   This block does NO credential verification. It only stages a
   client-side marker and forwards to /admin so the UI flow can be
   demoed end-to-end. Real auth MUST be enforced server-side:
   /admin has to validate a signed, httpOnly session cookie issued
   by the control plane and reject any request lacking one. Do not
   gate /admin on this localStorage value — it is trivially forged
   from the console and provides zero access control.
   ─────────────────────────────────────────────────────────────── */
var f=document.getElementById("f"),id=document.getElementById("id"),key=document.getElementById("key"),err=document.getElementById("err"),go=document.getElementById("go");
f.addEventListener("submit",function(e){e.preventDefault();err.textContent="";var u=id.value.trim(),k=key.value;if(!u||!k){err.textContent="Enter your Admin Identifier and Secure Key.";return}go.disabled=true;go.textContent="Signing in…";try{localStorage.setItem("vs.session",JSON.stringify({v:1,placeholder:true,id:u,issuedAt:new Date().toISOString()}))}catch(_){/* private mode / storage disabled — proceed anyway */}window.location.assign("/admin")});})();</script></body></html>
