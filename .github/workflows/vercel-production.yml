name: Vercel Production Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_sFi2o2TJyqEofocO8EORav7s
      VERCEL_PROJECT_ID: prj_oZxXqBRHBRSBJSO8Xmh05ZBb4Fkl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel
        run: npx vercel@50 deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
