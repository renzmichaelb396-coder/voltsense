<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <defs>
    <!-- Neon glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="280" fill="#060a12"/>

  <!-- Subtle radial ambient behind the logo -->
  <radialGradient id="ambient" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#16d39a" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#060a12" stop-opacity="0"/>
  </radialGradient>
  <rect width="720" height="280" fill="url(#ambient)"/>

  <!-- ═══ EVION WORDMARK ═══ -->
  <g filter="url(#glow)" fill="#16d39a">

    <!-- E -->
    <rect x="60"  y="74"  width="14" height="100"/>
    <rect x="60"  y="74"  width="58" height="14"/>
    <rect x="60"  y="117" width="46" height="12"/>
    <rect x="60"  y="160" width="58" height="14"/>

    <!-- V -->
    <polygon points="148,74 165,74 200,174 183,174"/>
    <polygon points="252,74 235,74 200,174 217,174"/>

    <!-- I — thin vertical stem -->
    <rect x="282" y="74"  width="12" height="100"/>
    <!-- top serif bar -->
    <rect x="270" y="74"  width="36" height="11"/>
    <!-- bottom serif bar -->
    <rect x="270" y="163" width="36" height="11"/>

    <!-- N -->
    <rect x="336" y="74"  width="13" height="100"/>
    <rect x="459" y="74"  width="13" height="100"/>
    <polygon points="349,74 365,74 472,174 456,174"/>

  </g>

  <!-- ═══ O = POWER BUTTON SYMBOL ═══ -->
  <g filter="url(#glow)">
    <!-- Outer circle ring (broken at top for power arc) -->
    <path
      d="M 407,124
         A 48,48 0 1 1 407.01,124"
      fill="none"
      stroke="#16d39a"
      stroke-width="13"
      stroke-dasharray="254 20"
      stroke-dashoffset="-8"
      stroke-linecap="round"
    />
    <!-- Power button vertical stem -->
    <rect x="400" y="82" width="12" height="42" rx="6" fill="#16d39a"/>
  </g>

  <!-- ═══ TAGLINE ═══ -->
  <text
    x="360" y="224"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="6"
    fill="#16d39a"
    opacity="0.55"
    filter="url(#softglow)"
  >EV CHARGING NETWORK</text>

  <!-- thin underline accent -->
  <line x1="200" y1="234" x2="520" y2="234" stroke="#16d39a" stroke-width="0.8" opacity="0.3"/>

</svg>
